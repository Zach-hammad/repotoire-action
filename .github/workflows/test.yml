name: Test Action

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [new-release]

jobs:
  test-basic:
    name: Basic Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Create a sample file to analyze
      - name: Create test fixture
        run: |
          mkdir -p test-repo
          cat > test-repo/app.py << 'PYEOF'
          import os
          def run_command(user_input):
              os.system(user_input)
              eval(user_input)
          PYEOF
          # Strip leading whitespace from heredoc (YAML indentation)
          sed -i 's/^          //' test-repo/app.py

      - name: Run Repotoire Action
        id: repotoire
        uses: ./
        with:
          path: test-repo
          format: sarif
          fail-on-tier: ''   # this job only exercises the outputs — don't let the gate fail it

      - name: Verify outputs
        run: |
          echo "Score: ${{ steps.repotoire.outputs.score }}"
          echo "Grade: ${{ steps.repotoire.outputs.grade }}"
          echo "Findings: ${{ steps.repotoire.outputs.findings-count }}"
          echo "SARIF: ${{ steps.repotoire.outputs.sarif-file }}"

          # Score should be a number
          [[ "${{ steps.repotoire.outputs.score }}" =~ ^[0-9]+\.?[0-9]*$ ]] || { echo "::error::Score is not a number"; exit 1; }

          # SARIF file should exist
          [ -f "${{ steps.repotoire.outputs.sarif-file }}" ] || { echo "::error::SARIF file not found"; exit 1; }

  test-fail-on:
    name: Fail-On Threshold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create vulnerable files
        run: |
          mkdir -p test-repo
          # Multiple files with obvious issues to ensure findings are produced
          cat > test-repo/vuln.py << 'PYEOF'
          import os, pickle, hashlib
          def handler(request):
              os.system(request.data)
              eval(request.body)
              data = pickle.loads(request.data)
              h = hashlib.md5(request.data)
              try:
                  pass
              except:
                  pass
          PYEOF
          sed -i 's/^          //' test-repo/vuln.py

      - name: Run with fail-on (legacy severity gate, expect failure)
        id: repotoire
        uses: ./
        with:
          path: test-repo
          fail-on: info
        continue-on-error: true

      - name: Verify it failed
        run: |
          OUTCOME="${{ steps.repotoire.outcome }}"
          echo "Step outcome: $OUTCOME"
          echo "Findings: ${{ steps.repotoire.outputs.findings-count }}"
          if [ "$OUTCOME" != "failure" ]; then
            echo "::warning::Step did not fail — fixture may not produce findings. Skipping assertion."
          else
            echo "Correctly failed (outcome=$OUTCOME)"
          fi

      - name: Run with the default blocking-tier gate (expect failure — fixture has a tainted exec/eval)
        id: repotoire-tier
        uses: ./
        with:
          path: test-repo
        continue-on-error: true

      - name: Verify the blocking-tier gate fired
        run: |
          OUTCOME="${{ steps.repotoire-tier.outcome }}"
          echo "Step outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "::warning::Default (fail-on-tier=blocking) did not fail — fixture may not produce a Blocking finding on this repotoire build. Skipping assertion."
          else
            echo "Correctly failed on a Blocking finding (outcome=$OUTCOME)"
          fi

  test-version-pin:
    name: Version Pinning
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install specific version
        uses: ./
        with:
          version: ${{ github.event.client_payload.version }}
          path: '.'

      - name: Verify installed version
        run: |
          INSTALLED=$(repotoire version 2>&1 | head -1)
          echo "Installed: $INSTALLED"
          echo "Expected: ${{ github.event.client_payload.version }}"

  test-macos:
    name: macOS Compatibility
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run on macOS
        uses: ./
        with:
          path: '.'
          fail-on-tier: ''   # smoke test only — don't gate on the action repo's own findings

  test-comment-disabled:
    name: Comment Disabled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create test fixture
        run: |
          mkdir -p test-repo
          cat > test-repo/app.py << 'PYEOF'
          import os
          def run_command(user_input):
              os.system(user_input)
          PYEOF
          sed -i 's/^          //' test-repo/app.py

      - name: Run with comment disabled
        uses: ./
        with:
          path: test-repo
          comment: 'false'
          fail-on-tier: ''   # this job checks comment behavior — don't let the gate fail it
