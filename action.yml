name: 'Repotoire Code Analysis'
description: 'The branch-relative code-health gate for CI — fails the build only on what the change introduced (tainted flows, committed credentials, security config-facts). 110 detectors, 9 languages.'
author: 'Zach-hammad'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  version:
    description: 'Repotoire version to install (e.g., "v0.9.0" or "latest"). The default gate (fail-on-tier) requires repotoire >= 0.9.0.'
    required: false
    default: 'latest'
  path:
    description: 'Path to the repository/directory to analyze'
    required: false
    default: '.'
  format:
    description: 'Output format: sarif, json, text, markdown'
    required: false
    default: 'sarif'
  fail-on-tier:
    description: 'Fail the build if a new finding at this tier or higher lands in the change: blocking, advisory, deep. Default "blocking" = the 0.9.0 gate (tainted-flow-to-dangerous-sink, committed credentials, security config-facts). Set to empty to never fail.'
    required: false
    default: 'blocking'
  fail-on:
    description: '[DEPRECATED — use fail-on-tier] Severity-based gate: fail if any finding meets this severity (critical, high, medium, low). When non-empty it overrides fail-on-tier (legacy v1 behavior). Empty = use fail-on-tier.'
    required: false
    default: ''
  diff-only:
    description: 'Only analyze diff vs base. "auto" = diff on PRs, full on push.'
    required: false
    default: 'auto'
  config:
    description: 'Path to repotoire.toml config file. Empty = auto-detect.'
    required: false
    default: ''
  args:
    description: 'Additional CLI arguments passed to repotoire analyze'
    required: false
    default: ''
  comment:
    description: 'Post analysis summary as a PR comment (pull_request events only)'
    required: false
    default: 'true'

outputs:
  score:
    description: 'Overall health score (0-100)'
    value: ${{ steps.parse-outputs.outputs.score }}
  grade:
    description: 'Letter grade (A+ through F)'
    value: ${{ steps.parse-outputs.outputs.grade }}
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.parse-outputs.outputs.findings-count }}
  critical-count:
    description: 'Critical severity findings'
    value: ${{ steps.parse-outputs.outputs.critical-count }}
  high-count:
    description: 'High severity findings'
    value: ${{ steps.parse-outputs.outputs.high-count }}
  sarif-file:
    description: 'Path to the SARIF output file'
    value: ${{ steps.analyze.outputs.sarif-file }}
  json-file:
    description: 'Path to the JSON output file'
    value: ${{ steps.analyze.outputs.json-file }}
  exit-code:
    description: 'Repotoire exit code (0 = pass, 1 = the fail-on-tier / fail-on gate triggered)'
    value: ${{ steps.analyze.outputs.exit-code }}

runs:
  using: 'composite'
  steps:
    - name: Install Repotoire
      id: install
      shell: bash
      run: ${{ github.action_path }}/scripts/install.sh
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GITHUB_TOKEN: ${{ github.token }}

    - name: Run Analysis
      id: analyze
      shell: bash
      run: ${{ github.action_path }}/scripts/analyze.sh
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_FAIL_ON_TIER: ${{ inputs.fail-on-tier }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_DIFF_ONLY: ${{ inputs.diff-only }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_ARGS: ${{ inputs.args }}

    - name: Parse Outputs
      id: parse-outputs
      shell: bash
      run: ${{ github.action_path }}/scripts/outputs.sh
      if: always()

    - name: PR Comment
      id: comment
      shell: bash
      run: ${{ github.action_path }}/scripts/comment.sh
      if: always()
      env:
        INPUT_COMMENT: ${{ inputs.comment }}
        GH_TOKEN: ${{ github.token }}
        INPUT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
